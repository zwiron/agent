name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GOPRIVATE: github.com/zwiron/*

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Configure private Go modules
        run: git config --global url."https://${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF_NAME}
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o zwiron-agent .
          tar czf zwiron-agent-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz zwiron-agent

      - uses: actions/upload-artifact@v4
        with:
          name: zwiron-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: zwiron-agent-*.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum zwiron-agent-*.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            zwiron-agent-*.tar.gz
            checksums.txt
